<body>

  <div class="login-container">

    <!-- LOGO -->
    <div class="logo">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/08/Orange_sun_icon.svg/512px-Orange_sun_icon.svg.png">
    </div>

    <h1>Đăng nhập tài khoản</h1>

    <!-- ROLE -->
    <div class="form-group">

      <div class="icon-box orange">
        <i class="fa-solid fa-building"></i>
      </div>

      <select id="role">
        <option>Sinh Viên</option>
        <option>Giảng Viên</option>
        <option>Quản Trị</option>
      </select>

    </div>

    <!-- USERNAME -->
    <div class="form-group">

      <div class="icon-box blue">
        <i class="fa-solid fa-user"></i>
      </div>

      <input type="text"
      id="username"
      placeholder="Nhập tài khoản">

    </div>

    <!-- PASSWORD -->
    <div class="form-group">

      <div class="icon-box gray">
        <i class="fa-solid fa-lock"></i>
      </div>

      <input type="password"
      id="password"
      placeholder="Nhập mật khẩu">

      <div class="eye"
      onclick="togglePassword()">

        <i class="fa-solid fa-eye"></i>

      </div>

    </div>

    <!-- FORGOT -->
    <a href="#"
    class="forgot"
    onclick="forgotPassword()">

      [ Quên mật khẩu ]

    </a>

    <!-- BUTTON -->
    <div class="btn-group">
       <a href="/ajaxStudy.html"></a>
      <button class="btn btn-login"
      onclick="login()">

        <i class="fa-solid fa-right-to-bracket ; " ></i>

        Đăng nhập

      </button>

      <button class="btn btn-home"
      onclick="goHome()">

        <i class="fa-solid fa-house"></i>
        Trang chủ

      </button>

    </div>

  </div>

  <script>

    // ==========================
    // HIỆN / ẨN PASSWORD
    // ==========================
    function togglePassword(){

      const password =
      document.getElementById("password");

      const eye =
      document.querySelector(".eye i");

      if(password.type === "password"){

        password.type = "text";

        eye.classList.remove("fa-eye");
        eye.classList.add("fa-eye-slash");

      }else{

        password.type = "password";

        eye.classList.remove("fa-eye-slash");
        eye.classList.add("fa-eye");
      }
    }

    // ==========================
    // ĐĂNG NHẬP
    // ==========================
    function login(){

      const username =
      document.getElementById("username")
      .value.trim();

      const password =
      document.getElementById("password")
      .value.trim();

      const role =
      document.getElementById("role")
      .value;

      // KIỂM TRA RỖNG
      if(username === "" || password === ""){

        alert("Vui lòng nhập đầy đủ thông tin!");
        return;
      }

      // TÀI KHOẢN MẪU
      // admin / 123456
      // student / 123456

      if(username === "admin"
      && password === "123456"){

        alert(
          "Đăng nhập Admin thành công!"
        );

        localStorage.setItem("user", username);
        localStorage.setItem("role", role);

        // CHUYỂN TRANG
        window.location.href =
        "ajaxStudy.html";

        return;
      }

      if(username === "student"
      && password === "123456"){

        alert(
          "Đăng nhập Sinh viên thành công!"
        );

        localStorage.setItem("user", username);
        localStorage.setItem("role", role);

        window.location.href =
        "ajaxStudy.html";

        return;
      }

      // SAI TÀI KHOẢN
      alert("Sai tài khoản hoặc mật khẩu!");
    }

    // ==========================
    // ENTER ĐỂ LOGIN
    // ==========================
    document.addEventListener(
      "keydown",
      function(event){

      if(event.key === "Enter"){

        login();
      }
    });

    // ==========================
    // TRANG CHỦ
    // ==========================
    function goHome(){

      alert("Đang quay về trang chủ!");

      // ĐỔI LINK NẾU CẦN
      window.location.href =
      "index.html";
    }

    // ==========================
    // QUÊN MẬT KHẨU
    // ==========================
    function forgotPassword(){

      const email =
      prompt("Nhập email để nhận lại mật khẩu:");

      if(email){

        alert(
          "Đã gửi link khôi phục tới:\n"
          + email
        );
      }
    }

  </script>

</body>

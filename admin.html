<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Luxury Login System</title>

    <!-- BOOTSTRAP 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <!-- FONT AWESOME -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

    <a href="index.html"></a>
    <a href="index2.html"></a>

</head>

<body>

    <a href="index.html"></a>
    <a href="index2.html"></a>

    <!-- BACKGROUND -->
    <div class="bg-animation">

        <span></span>
        <span></span>
        <span></span>
        <span></span>

    </div>

    <!-- CONTAINER -->
    <div class="container-fluid min-vh-100 d-flex justify-content-center align-items-center p-3">

        <!-- ROW -->
        <div class="row w-100 justify-content-center">

            <!-- COL -->
            <div class="col-12 col-sm-10 col-md-8 col-lg-5">

                <!-- LOGIN -->
                <div class="login-container shadow-lg rounded-5 p-4 p-md-5">

                    <!-- LOGO -->
                    <div class="logo text-center mb-4">

                        <img
                        class="img-fluid"
                        style="max-width:120px;"
                        src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/08/Orange_sun_icon.svg/512px-Orange_sun_icon.svg.png">

                    </div>

                    <!-- TITLE -->
                    <h1 class="text-center fw-bold text-white mb-2">

                        Đăng nhập hệ thống

                    </h1>

                    <p class="sub-title text-center text-light mb-4">

                    </p>

                    <!-- BADGE -->
                    <div class="text-center mb-4">

                        <span class="badge bg-warning text-dark fs-6 px-3 py-2">

                            

                        </span>

                    </div>

                    <!-- ROLE -->
                    <div class="form-group mb-4">

                        <div class="icon-box orange">
                            <i class="fa-solid fa-building"></i>
                        </div>

                        <select id="role"
                        class="form-select shadow-sm">

                            <option>Sinh Viên</option>
                            <option>Giảng Viên</option>
                            <option>Quản Trị</option>

                        </select>

                    </div>

                    <!-- USERNAME -->
                    <div class="form-group mb-4">

                        <div class="icon-box blue">
                            <i class="fa-solid fa-user"></i>
                        </div>

                        <input
                        type="text"
                        id="username"
                        class="form-control shadow-sm"
                        placeholder="Nhập tài khoản">

                    </div>

                    <!-- PASSWORD -->
                    <div class="form-group mb-3">

                        <div class="icon-box gray">
                            <i class="fa-solid fa-lock"></i>
                        </div>

                        <input
                        type="password"
                        id="password"
                        class="form-control shadow-sm"
                        placeholder="Nhập mật khẩu">

                        <div class="eye"
                        onclick="togglePassword()">

                            <i class="fa-solid fa-eye"></i>

                        </div>

                    </div>

                    <!-- FORGOT -->
                    <div class="text-end mb-4">

                        <a href="#"
                        class="forgot text-warning fw-semibold text-decoration-none"
                        onclick="forgotPassword()">

                            Quên mật khẩu?

                        </a>

                    </div>

                    <!-- BUTTON -->
                    <div class="btn-group-custom d-grid gap-3">

                        <button
                        class="btn btn-primary btn-lg rounded-pill shadow"
                        onclick="login()">

                            <i class="fa-solid fa-right-to-bracket"></i>
                            Đăng nhập

                        </button>

                        <button
                        class="btn btn-outline-light btn-lg rounded-pill"
                        onclick="goHome()">

                            <i class="fa-solid fa-house"></i>
                            Trang chủ

                        </button>

                    </div>

                    <!-- TABLE COMPONENT -->
                    <div class="table-responsive mt-5">

                        <table class="table table-bordered table-hover text-center align-middle">

                            <thead class="table-dark">

                                <tr>

                                    <th>Tài khoản</th>
                                    <th>Mật khẩu</th>

                                </tr>

                            </thead>

                            <tbody>

                                <tr>

                                    <td>admin</td>
                                    <td>123456</td>

                                </tr>

                                <tr>

                                    <td>student</td>
                                    <td>123456</td>

                                </tr>

                                <tr>

                                    <td>lecturer</td>
                                    <td>123456</td>

                                </tr>

                            </tbody>

                        </table>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- BOOTSTRAP JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS -->
    <script src="js/admin.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Luxury Login System</title>

    <!-- FONT AWESOME -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- CSS -->
<link rel="stylesheet" href="css/style.css">
    <a href="index.html"></a>
    <a href="index2.html"></a>
</head>

<body>
        <a href="index.html"></a>
        <a href="index2.html"></a>

    <!-- BACKGROUND -->
    <div class="bg-animation">

        <span></span>
        <span></span>
        <span></span>
        <span></span>

    </div>

    <!-- LOGIN -->
    <div class="login-container">

        <!-- LOGO -->
        <div class="logo">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/08/Orange_sun_icon.svg/512px-Orange_sun_icon.svg.png">
        </div>

        <!-- TITLE -->
        <h1>Đăng nhập hệ thống</h1>

        <p class="sub-title">
            Luxury Admin Security Platform
        </p>

        <!-- ROLE -->
        <div class="form-group">

            <div class="icon-box orange">
                <i class="fa-solid fa-building"></i>
            </div>

            <select id="role">

                <option>Sinh Viên</option>
                <option>Giảng Viên</option>
                <option>Quản Trị</option>

            </select>

        </div>

        <!-- USERNAME -->
        <div class="form-group">

            <div class="icon-box blue">
                <i class="fa-solid fa-user"></i>
            </div>

            <input type="text"
            id="username"
            placeholder="Nhập tài khoản">

        </div>

        <!-- PASSWORD -->
        <div class="form-group">

            <div class="icon-box gray">
                <i class="fa-solid fa-lock"></i>
            </div>

            <input type="password"
            id="password"
            placeholder="Nhập mật khẩu">

            <div class="eye"
            onclick="togglePassword()">

                <i class="fa-solid fa-eye"></i>

            </div>

        </div>

        <!-- FORGOT -->
        <a href="#"
        class="forgot"
        onclick="forgotPassword()">

            Quên mật khẩu?

        </a>

        <!-- BUTTON -->
        <div class="btn-group">

            <button class="btn btn-login"
            onclick="login()">

                <i class="fa-solid fa-right-to-bracket"></i>
                Đăng nhập

            </button>

            <button class="btn btn-home"
            onclick="goHome()">

                <i class="fa-solid fa-house"></i>
                Trang chủ

            </button>

        </div>

    </div>

    <script src="js/admin.js"></script>

</body>
</html>
